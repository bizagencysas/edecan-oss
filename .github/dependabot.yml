version: 2

updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: America/Bogota
    open-pull-requests-limit: 5
    commit-message:
      prefix: chore(ci)
    groups:
      github-actions:
        patterns:
          - "*"

  - package-ecosystem: uv
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:30"
      timezone: America/Bogota
    open-pull-requests-limit: 5
    commit-message:
      prefix: chore(python)
    groups:
      python-dependencies:
        patterns:
          - "*"

  - package-ecosystem: npm
    directory: /apps/web
    schedule:
      interval: weekly
      day: monday
      time: "10:00"
      timezone: America/Bogota
    open-pull-requests-limit: 5
    commit-message:
      prefix: chore(web)
    groups:
      web-dependencies:
        patterns:
          - "*"

  - package-ecosystem: cargo
    directory: /apps/desktop/src-tauri
    schedule:
      interval: weekly
      day: tuesday
      time: "09:00"
      timezone: America/Bogota
    open-pull-requests-limit: 5
    commit-message:
      prefix: chore(desktop)
    groups:
      rust-dependencies:
        patterns:
          - "*"

  - package-ecosystem: gradle
    directory: /apps/mobile/android
    schedule:
      interval: weekly
      day: tuesday
      time: "09:30"
      timezone: America/Bogota
    open-pull-requests-limit: 5
    commit-message:
      prefix: chore(android)
    groups:
      android-dependencies:
        patterns:
          - "*"

  - package-ecosystem: swift
    directory: /apps/mobile/ios/EdecanKit
    schedule:
      interval: weekly
      day: tuesday
      time: "10:00"
      timezone: America/Bogota
    open-pull-requests-limit: 5
    commit-message:
      prefix: chore(ios)
    groups:
      swift-dependencies:
        patterns:
          - "*"

  - package-ecosystem: docker-compose
    directory: /
    schedule:
      interval: weekly
      day: wednesday
      time: "09:00"
      timezone: America/Bogota
    open-pull-requests-limit: 5
    commit-message:
      prefix: chore(containers)
    groups:
      container-images:
        patterns:
          - "*"
