name: Desktop release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  # Las publicaciones de escritorio se serializan entre sí. Android e iOS
  # tienen sus propias colas y todos resuelven carreras al mover la rama.
  group: release-desktop-updates
  cancel-in-progress: false

env:
  NEXT_TELEMETRY_DISABLED: "1"
  TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
  TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

jobs:
  macos:
    name: macOS arm64 signed updater
    runs-on: macos-26
    timeout-minutes: 90
    env:
      MACOS_CERTIFICATE_P12_BASE64: ${{ secrets.MACOS_CERTIFICATE_P12_BASE64 }}
      MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
      MACOS_NOTARY_API_KEY_ID: ${{ secrets.MACOS_NOTARY_API_KEY_ID }}
      MACOS_NOTARY_API_ISSUER: ${{ secrets.MACOS_NOTARY_API_ISSUER }}
      MACOS_NOTARY_API_PRIVATE_KEY_BASE64: ${{ secrets.MACOS_NOTARY_API_PRIVATE_KEY_BASE64 }}
      MACOS_EXPECTED_TEAM_ID: ${{ vars.MACOS_EXPECTED_TEAM_ID }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Require every macOS release identity
        shell: bash
        run: |
          set -euo pipefail
          test -n "$TAURI_SIGNING_PRIVATE_KEY" || {
            echo "::error::Falta el secret TAURI_SIGNING_PRIVATE_KEY"
            exit 1
          }
          for name in \
            MACOS_CERTIFICATE_P12_BASE64 \
            MACOS_CERTIFICATE_PASSWORD \
            MACOS_NOTARY_API_KEY_ID \
            MACOS_NOTARY_API_ISSUER \
            MACOS_NOTARY_API_PRIVATE_KEY_BASE64 \
            MACOS_EXPECTED_TEAM_ID
          do
            test -n "${!name:-}" || {
              echo "::error::Falta la configuración de release $name"
              exit 1
            }
          done
          [[ "$MACOS_EXPECTED_TEAM_ID" =~ ^[A-Z0-9]{10}$ ]] || {
            echo "::error::MACOS_EXPECTED_TEAM_ID no tiene el formato de Apple esperado"
            exit 1
          }
          [[ "$MACOS_NOTARY_API_KEY_ID" =~ ^[A-Z0-9]{10}$ ]] || {
            echo "::error::MACOS_NOTARY_API_KEY_ID no tiene el formato esperado"
            exit 1
          }
          test "$(uname -m)" = "arm64" || {
            echo "::error::El release macOS debe construirse nativamente en arm64"
            exit 1
          }

      - name: Import Developer ID and prepare notarization
        shell: bash
        run: |
          set -euo pipefail
          umask 077
          CERTIFICATE_PATH="$RUNNER_TEMP/edecan-developer-id.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/edecan-release.keychain-db"
          API_KEY_PATH="$RUNNER_TEMP/AuthKey_${MACOS_NOTARY_API_KEY_ID}.p8"
          KEYCHAIN_PASSWORD="$(openssl rand -hex 32)"

          printf '%s' "$MACOS_CERTIFICATE_P12_BASE64" \
            | openssl base64 -d -A > "$CERTIFICATE_PATH"
          printf '%s' "$MACOS_NOTARY_API_PRIVATE_KEY_BASE64" \
            | openssl base64 -d -A > "$API_KEY_PATH"
          test -s "$CERTIFICATE_PATH"
          test -s "$API_KEY_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" \
            -k "$KEYCHAIN_PATH" \
            -P "$MACOS_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s \
            -k "$KEYCHAIN_PASSWORD" \
            "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH"

          IDENTITIES="$(
            security find-identity -v -p codesigning "$KEYCHAIN_PATH" \
              | sed -n 's/^[[:space:]]*[0-9][0-9]*) [A-F0-9]* "\(Developer ID Application: .*\)"$/\1/p'
          )"
          IDENTITY_COUNT="$(
            printf '%s\n' "$IDENTITIES" | sed '/^[[:space:]]*$/d' | wc -l | tr -d ' '
          )"
          test "$IDENTITY_COUNT" -eq 1 || {
            echo "::error::El P12 debe contener exactamente una identidad Developer ID Application válida"
            exit 1
          }
          IDENTITY="$IDENTITIES"
          [[ "$IDENTITY" == *"($MACOS_EXPECTED_TEAM_ID)" ]] || {
            echo "::error::La identidad Developer ID no pertenece al Team ID esperado"
            exit 1
          }

          {
            echo "APPLE_SIGNING_IDENTITY=$IDENTITY"
            echo "EDECAN_MACOS_CODESIGN_IDENTITY=$IDENTITY"
            echo "APPLE_API_KEY=$MACOS_NOTARY_API_KEY_ID"
            echo "APPLE_API_ISSUER=$MACOS_NOTARY_API_ISSUER"
            echo "APPLE_API_KEY_PATH=$API_KEY_PATH"
            echo "EDECAN_RELEASE_KEYCHAIN=$KEYCHAIN_PATH"
          } >> "$GITHUB_ENV"

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: |
            apps/web/package-lock.json
            packages/fydesign-engine/package-lock.json

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "0.11.19"
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Install pinned Tauri CLI
        run: cargo install tauri-cli --version 2.11.4 --locked

      - name: Require updater key compiled into the desktop runtime
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import base64
          import json
          from pathlib import Path

          config = json.loads(
              Path("apps/desktop/src-tauri/tauri.conf.json").read_text(
                  encoding="utf-8"
              )
          )
          configured = base64.b64decode(
              config["plugins"]["updater"]["pubkey"],
              validate=True,
          ).decode("utf-8")
          pinned = Path("apps/desktop/updater.pub").read_text(encoding="utf-8")
          if configured.strip() != pinned.strip():
              raise SystemExit(
                  "apps/desktop/updater.pub no coincide con la clave "
                  "compilada en tauri.conf.json"
              )
          PY

      - name: Build macOS updater and DMG
        run: ./apps/desktop/scripts/build-app.sh

      - name: Notarize and staple the public DMG
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          DMGS=(apps/desktop/src-tauri/target/release/bundle/dmg/*.dmg)
          test "${#DMGS[@]}" -eq 1
          hdiutil verify "${DMGS[0]}"
          xcrun notarytool submit "${DMGS[0]}" \
            --key "$APPLE_API_KEY_PATH" \
            --key-id "$APPLE_API_KEY" \
            --issuer "$APPLE_API_ISSUER" \
            --wait \
            --timeout 45m
          xcrun stapler staple "${DMGS[0]}"

      - name: Verify Developer ID, notarization and updater signature
        shell: bash
        run: |
          set -euo pipefail
          APP="apps/desktop/src-tauri/target/release/bundle/macos/Edecán.app"
          shopt -s nullglob
          DMGS=(apps/desktop/src-tauri/target/release/bundle/dmg/*.dmg)
          UPDATERS=(apps/desktop/src-tauri/target/release/bundle/macos/*.app.tar.gz)
          test "${#DMGS[@]}" -eq 1
          test "${#UPDATERS[@]}" -eq 1

          codesign --verify --deep --strict --verbose=2 "$APP"
          SIGNATURE_INFO="$(codesign -dv --verbose=4 "$APP" 2>&1)"
          grep -F "Authority=Developer ID Application:" <<< "$SIGNATURE_INFO"
          grep -F "TeamIdentifier=$MACOS_EXPECTED_TEAM_ID" <<< "$SIGNATURE_INFO"
          xcrun stapler validate "$APP"
          xcrun stapler validate "${DMGS[0]}"
          spctl --assess --type execute --verbose=4 "$APP"
          spctl --assess --type open \
            --context context:primary-signature \
            --verbose=4 \
            "${DMGS[0]}"
          cargo run --locked --quiet \
            --manifest-path apps/desktop/src-tauri/Cargo.toml \
            --bin verify-updater-signature \
            -- \
            "${UPDATERS[0]}" \
            "${UPDATERS[0]}.sig" \
            apps/desktop/updater.pub

      - name: Require the signed macOS updater artifact
        shell: bash
        run: |
          shopt -s nullglob
          artifacts=(apps/desktop/src-tauri/target/release/bundle/macos/*.app.tar.gz)
          test "${#artifacts[@]}" -eq 1
          test -s "${artifacts[0]}.sig"

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: desktop-macos-aarch64
          if-no-files-found: error
          retention-days: 7
          path: |
            apps/desktop/src-tauri/target/release/bundle/macos/*.app.tar.gz
            apps/desktop/src-tauri/target/release/bundle/macos/*.app.tar.gz.sig
            apps/desktop/src-tauri/target/release/bundle/dmg/*.dmg

      - name: Remove macOS release credentials
        if: always()
        shell: bash
        run: |
          if test -n "${EDECAN_RELEASE_KEYCHAIN:-}" &&
             test -f "$EDECAN_RELEASE_KEYCHAIN"
          then
            security delete-keychain "$EDECAN_RELEASE_KEYCHAIN" || true
          fi
          CERTIFICATE_PATH="$RUNNER_TEMP/edecan-developer-id.p12"
          API_KEY_PATH="$RUNNER_TEMP/AuthKey_${MACOS_NOTARY_API_KEY_ID:-missing}.p8"
          if test -f "$CERTIFICATE_PATH"; then
            rm -f "$CERTIFICATE_PATH"
          fi
          if test -f "$API_KEY_PATH"; then
            rm -f "$API_KEY_PATH"
          fi

  linux:
    name: Linux x86_64 signed updater
    runs-on: ubuntu-22.04
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Require release signing key
        run: |
          test -n "$TAURI_SIGNING_PRIVATE_KEY" || {
            echo "::error::Falta el secret TAURI_SIGNING_PRIVATE_KEY"
            exit 1
          }

      - name: Install native build and smoke dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --yes --no-install-recommends \
            build-essential curl dbus-x11 file gstreamer1.0-libav \
            gstreamer1.0-plugins-base gstreamer1.0-plugins-good libasound2-dev \
            libayatana-appindicator3-dev libfuse2 librsvg2-dev libssl-dev \
            libwebkit2gtk-4.1-dev libxdo-dev openbox patchelf pkg-config rpm \
            wget wmctrl xvfb

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: |
            apps/web/package-lock.json
            packages/fydesign-engine/package-lock.json

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "0.11.19"
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Install pinned Tauri CLI
        run: cargo install tauri-cli --version 2.11.4 --locked

      - name: Build and exercise Linux packages
        run: |
          ./apps/desktop/scripts/build-app.sh
          ./apps/desktop/scripts/verify-linux-bundles.sh

      - name: Require every signed Linux updater format
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          for pattern in \
            "apps/desktop/src-tauri/target/release/bundle/appimage/*.AppImage" \
            "apps/desktop/src-tauri/target/release/bundle/deb/*.deb" \
            "apps/desktop/src-tauri/target/release/bundle/rpm/*.rpm"; do
            mapfile -t artifacts < <(compgen -G "$pattern")
            test "${#artifacts[@]}" -eq 1
            test -s "${artifacts[0]}.sig"
            cargo run --locked --quiet \
              --manifest-path apps/desktop/src-tauri/Cargo.toml \
              --bin verify-updater-signature \
              -- \
              "${artifacts[0]}" \
              "${artifacts[0]}.sig" \
              apps/desktop/updater.pub
          done

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: desktop-linux-x86_64
          if-no-files-found: error
          retention-days: 7
          path: |
            apps/desktop/src-tauri/target/release/bundle/appimage/*.AppImage
            apps/desktop/src-tauri/target/release/bundle/appimage/*.AppImage.sig
            apps/desktop/src-tauri/target/release/bundle/deb/*.deb
            apps/desktop/src-tauri/target/release/bundle/deb/*.deb.sig
            apps/desktop/src-tauri/target/release/bundle/rpm/*.rpm
            apps/desktop/src-tauri/target/release/bundle/rpm/*.rpm.sig

  windows:
    name: Windows x86_64 signed updater
    runs-on: windows-2025
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Require release signing key
        shell: pwsh
        run: |
          if ([string]::IsNullOrWhiteSpace($env:TAURI_SIGNING_PRIVATE_KEY)) {
            throw "Falta el secret TAURI_SIGNING_PRIVATE_KEY"
          }

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: |
            apps/web/package-lock.json
            packages/fydesign-engine/package-lock.json

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "0.11.19"
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Install pinned Tauri CLI
        run: cargo install tauri-cli --version 2.11.4 --locked

      - name: Build and exercise Windows installers
        shell: pwsh
        run: |
          .\apps\desktop\scripts\build-app.ps1
          .\apps\desktop\scripts\verify-windows-bundles.ps1

      - name: Require every signed Windows updater format
        shell: pwsh
        run: |
          foreach ($pattern in @(
            "apps\desktop\src-tauri\target\release\bundle\nsis\*.exe",
            "apps\desktop\src-tauri\target\release\bundle\msi\*.msi"
          )) {
            $artifacts = @(Get-ChildItem -Path $pattern -File)
            if ($artifacts.Count -ne 1) {
              throw "Se esperaba exactamente un artefacto de updater para $pattern."
            }
            $signature = "$($artifacts[0].FullName).sig"
            if (-not (Test-Path -LiteralPath $signature -PathType Leaf) -or
                (Get-Item -LiteralPath $signature).Length -eq 0) {
              throw "Falta la firma del updater: $signature"
            }
            cargo run --locked --quiet `
              --manifest-path apps\desktop\src-tauri\Cargo.toml `
              --bin verify-updater-signature `
              -- `
              $artifacts[0].FullName `
              $signature `
              apps\desktop\updater.pub
            if ($LASTEXITCODE -ne 0) {
              throw "La firma del updater no pertenece a la raíz pública fijada."
            }
          }

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: desktop-windows-x86_64
          if-no-files-found: error
          retention-days: 7
          path: |
            apps/desktop/src-tauri/target/release/bundle/nsis/*.exe
            apps/desktop/src-tauri/target/release/bundle/nsis/*.exe.sig
            apps/desktop/src-tauri/target/release/bundle/msi/*.msi
            apps/desktop/src-tauri/target/release/bundle/msi/*.msi.sig

  publish:
    name: Publish release and move signed channel
    needs: [macos, linux, windows]
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          pattern: desktop-*
          path: release-artifacts
          merge-multiple: false

      - name: Validate version, create release, and upload native packages
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          TAG="$GITHUB_REF_NAME"
          VERSION="${TAG#v}"
          git fetch origin main
          git merge-base --is-ancestor "$GITHUB_SHA" origin/main || {
            echo "::error::El tag de release no pertenece a main"
            exit 1
          }
          CONFIG_VERSION="$(python3 -c 'import json; print(json.load(open("apps/desktop/src-tauri/tauri.conf.json"))["version"])')"
          CARGO_VERSION="$(sed -n 's/^version = "\\([^"]*\\)"/\\1/p' apps/desktop/src-tauri/Cargo.toml | head -1)"
          WEB_VERSION="$(python3 -c 'import json; print(json.load(open("apps/web/package.json"))["version"])')"
          test "$VERSION" = "$CONFIG_VERSION"
          test "$VERSION" = "$CARGO_VERSION"
          test "$VERSION" = "$WEB_VERSION"

          if [[ "$VERSION" == *-* ]]; then
            CHANNEL="preview"
          else
            CHANNEL="stable"
          fi
          echo "CHANNEL=$CHANNEL" >> "$GITHUB_ENV"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"

          scripts/release/ensure-github-release.sh "$TAG" "$VERSION" "$CHANNEL"
          while IFS= read -r -d '' file; do
            scripts/release/upload-github-release-asset.sh "$TAG" "$file"
          done < <(find release-artifacts -type f -print0)
          gh release view "$TAG" --json body --jq .body > release-notes.md
          RELEASE_CREATED_AT="$(
            gh release view "$TAG" --json createdAt --jq .createdAt
          )"
          test -n "$RELEASE_CREATED_AT"
          test "$RELEASE_CREATED_AT" != "null"
          echo "RELEASE_CREATED_AT=$RELEASE_CREATED_AT" >> "$GITHUB_ENV"

      - name: Generate and upload fail-closed updater manifest
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          python3 apps/desktop/scripts/generate-update-manifest.py \
            --artifacts release-artifacts \
            --repository "$GITHUB_REPOSITORY" \
            --tag "$GITHUB_REF_NAME" \
            --version "$VERSION" \
            --published-at "$RELEASE_CREATED_AT" \
            --notes-file release-notes.md \
            --output latest.json
          scripts/release/upload-github-release-asset.sh \
            "$GITHUB_REF_NAME" \
            latest.json

      - name: Publish only when every configured platform is complete
        shell: bash
        env:
          EDECAN_IOS_INSTALL_URL: ${{ vars.EDECAN_IOS_INSTALL_URL }}
        run: |
          set -euo pipefail
          IOS_REQUIRED=false
          if test -n "$EDECAN_IOS_INSTALL_URL"; then
            IOS_REQUIRED=true
          fi
          scripts/release/finalize-github-release.sh \
            "$GITHUB_REF_NAME" \
            "$VERSION" \
            "$CHANNEL" \
            "$IOS_REQUIRED" \
            origin
