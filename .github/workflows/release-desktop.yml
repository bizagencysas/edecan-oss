name: Desktop release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  # Un único escritor mueve stable/preview. Evita que dos tags terminen
  # publicando el canal al mismo tiempo.
  group: desktop-release-channels
  cancel-in-progress: false

env:
  NEXT_TELEMETRY_DISABLED: "1"
  TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
  TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

jobs:
  macos:
    name: macOS arm64 signed updater
    runs-on: macos-26
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Require release signing key and native arm64 runner
        shell: bash
        run: |
          test -n "$TAURI_SIGNING_PRIVATE_KEY" || {
            echo "::error::Falta el secret TAURI_SIGNING_PRIVATE_KEY"
            exit 1
          }
          test "$(uname -m)" = "arm64" || {
            echo "::error::El release macOS debe construirse nativamente en arm64"
            exit 1
          }

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: |
            apps/web/package-lock.json
            packages/fydesign-engine/package-lock.json

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "0.11.19"
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Install pinned Tauri CLI
        run: cargo install tauri-cli --version 2.11.4 --locked

      - name: Build macOS updater and DMG
        run: ./apps/desktop/scripts/build-app.sh

      - name: Verify the application seal
        run: codesign --verify --deep --strict apps/desktop/src-tauri/target/release/bundle/macos/Edecán.app

      - name: Require the signed macOS updater artifact
        shell: bash
        run: |
          shopt -s nullglob
          artifacts=(apps/desktop/src-tauri/target/release/bundle/macos/*.app.tar.gz)
          test "${#artifacts[@]}" -eq 1
          test -s "${artifacts[0]}.sig"

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: desktop-macos-aarch64
          if-no-files-found: error
          retention-days: 7
          path: |
            apps/desktop/src-tauri/target/release/bundle/macos/*.app.tar.gz
            apps/desktop/src-tauri/target/release/bundle/macos/*.app.tar.gz.sig
            apps/desktop/src-tauri/target/release/bundle/dmg/*.dmg

  linux:
    name: Linux x86_64 signed updater
    runs-on: ubuntu-22.04
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Require release signing key
        run: |
          test -n "$TAURI_SIGNING_PRIVATE_KEY" || {
            echo "::error::Falta el secret TAURI_SIGNING_PRIVATE_KEY"
            exit 1
          }

      - name: Install native build and smoke dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --yes --no-install-recommends \
            build-essential curl dbus-x11 file gstreamer1.0-libav \
            gstreamer1.0-plugins-base gstreamer1.0-plugins-good libasound2-dev \
            libayatana-appindicator3-dev libfuse2 librsvg2-dev libssl-dev \
            libwebkit2gtk-4.1-dev libxdo-dev openbox patchelf pkg-config rpm \
            wget wmctrl xvfb

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: |
            apps/web/package-lock.json
            packages/fydesign-engine/package-lock.json

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "0.11.19"
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Install pinned Tauri CLI
        run: cargo install tauri-cli --version 2.11.4 --locked

      - name: Build and exercise Linux packages
        run: |
          ./apps/desktop/scripts/build-app.sh
          ./apps/desktop/scripts/verify-linux-bundles.sh

      - name: Require every signed Linux updater format
        shell: bash
        run: |
          shopt -s nullglob
          for pattern in \
            "apps/desktop/src-tauri/target/release/bundle/appimage/*.AppImage" \
            "apps/desktop/src-tauri/target/release/bundle/deb/*.deb" \
            "apps/desktop/src-tauri/target/release/bundle/rpm/*.rpm"; do
            mapfile -t artifacts < <(compgen -G "$pattern")
            test "${#artifacts[@]}" -eq 1
            test -s "${artifacts[0]}.sig"
          done

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: desktop-linux-x86_64
          if-no-files-found: error
          retention-days: 7
          path: |
            apps/desktop/src-tauri/target/release/bundle/appimage/*.AppImage
            apps/desktop/src-tauri/target/release/bundle/appimage/*.AppImage.sig
            apps/desktop/src-tauri/target/release/bundle/deb/*.deb
            apps/desktop/src-tauri/target/release/bundle/deb/*.deb.sig
            apps/desktop/src-tauri/target/release/bundle/rpm/*.rpm
            apps/desktop/src-tauri/target/release/bundle/rpm/*.rpm.sig

  windows:
    name: Windows x86_64 signed updater
    runs-on: windows-2025
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Require release signing key
        shell: pwsh
        run: |
          if ([string]::IsNullOrWhiteSpace($env:TAURI_SIGNING_PRIVATE_KEY)) {
            throw "Falta el secret TAURI_SIGNING_PRIVATE_KEY"
          }

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: |
            apps/web/package-lock.json
            packages/fydesign-engine/package-lock.json

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "0.11.19"
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Install pinned Tauri CLI
        run: cargo install tauri-cli --version 2.11.4 --locked

      - name: Build and exercise Windows installers
        shell: pwsh
        run: |
          .\apps\desktop\scripts\build-app.ps1
          .\apps\desktop\scripts\verify-windows-bundles.ps1

      - name: Require every signed Windows updater format
        shell: pwsh
        run: |
          foreach ($pattern in @(
            "apps\desktop\src-tauri\target\release\bundle\nsis\*.exe",
            "apps\desktop\src-tauri\target\release\bundle\msi\*.msi"
          )) {
            $artifacts = @(Get-ChildItem -Path $pattern -File)
            if ($artifacts.Count -ne 1) {
              throw "Se esperaba exactamente un artefacto de updater para $pattern."
            }
            $signature = "$($artifacts[0].FullName).sig"
            if (-not (Test-Path -LiteralPath $signature -PathType Leaf) -or
                (Get-Item -LiteralPath $signature).Length -eq 0) {
              throw "Falta la firma del updater: $signature"
            }
          }

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: desktop-windows-x86_64
          if-no-files-found: error
          retention-days: 7
          path: |
            apps/desktop/src-tauri/target/release/bundle/nsis/*.exe
            apps/desktop/src-tauri/target/release/bundle/nsis/*.exe.sig
            apps/desktop/src-tauri/target/release/bundle/msi/*.msi
            apps/desktop/src-tauri/target/release/bundle/msi/*.msi.sig

  publish:
    name: Publish release and move signed channel
    needs: [macos, linux, windows]
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          pattern: desktop-*
          path: release-artifacts
          merge-multiple: false

      - name: Validate version, create release, and upload native packages
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          TAG="$GITHUB_REF_NAME"
          VERSION="${TAG#v}"
          git fetch origin main
          git merge-base --is-ancestor "$GITHUB_SHA" origin/main || {
            echo "::error::El tag de release no pertenece a main"
            exit 1
          }
          CONFIG_VERSION="$(python3 -c 'import json; print(json.load(open("apps/desktop/src-tauri/tauri.conf.json"))["version"])')"
          CARGO_VERSION="$(sed -n 's/^version = "\\([^"]*\\)"/\\1/p' apps/desktop/src-tauri/Cargo.toml | head -1)"
          WEB_VERSION="$(python3 -c 'import json; print(json.load(open("apps/web/package.json"))["version"])')"
          test "$VERSION" = "$CONFIG_VERSION"
          test "$VERSION" = "$CARGO_VERSION"
          test "$VERSION" = "$WEB_VERSION"

          if [[ "$VERSION" == *-* ]]; then
            CHANNEL="preview"
            PRERELEASE_FLAG="--prerelease"
          else
            CHANNEL="stable"
            PRERELEASE_FLAG=""
          fi
          echo "CHANNEL=$CHANNEL" >> "$GITHUB_ENV"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"

          if ! gh release view "$TAG" >/dev/null 2>&1; then
            # shellcheck disable=SC2086
            gh release create "$TAG" --verify-tag --title "Edecán $VERSION" \
              --generate-notes $PRERELEASE_FLAG
          fi
          while IFS= read -r -d '' file; do
            gh release upload "$TAG" "$file" --clobber
          done < <(find release-artifacts -type f -print0)
          gh release view "$TAG" --json body --jq .body > release-notes.md

      - name: Generate and upload fail-closed updater manifest
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          python3 apps/desktop/scripts/generate-update-manifest.py \
            --artifacts release-artifacts \
            --repository "$GITHUB_REPOSITORY" \
            --tag "$GITHUB_REF_NAME" \
            --version "$VERSION" \
            --notes-file release-notes.md \
            --output latest.json
          gh release upload "$GITHUB_REF_NAME" latest.json --clobber

      - name: Move stable or preview channel after every asset is published
        shell: bash
        run: |
          set -euo pipefail
          CHANNEL_WORKTREE="$(mktemp -d)"
          if git ls-remote --exit-code --heads origin update-channels >/dev/null 2>&1; then
            git fetch origin update-channels
            git worktree add -B update-channels "$CHANNEL_WORKTREE" origin/update-channels
          else
            git worktree add --detach "$CHANNEL_WORKTREE"
            git -C "$CHANNEL_WORKTREE" switch --orphan update-channels
            git -C "$CHANNEL_WORKTREE" rm -rf . || true
          fi
          if test -f "$CHANNEL_WORKTREE/$CHANNEL.json"; then
            CURRENT_VERSION="$(python3 -c 'import json,sys; print(json.load(open(sys.argv[1]))["version"])' "$CHANNEL_WORKTREE/$CHANNEL.json")"
            NEWEST_VERSION="$(printf '%s\n%s\n' "$CURRENT_VERSION" "$VERSION" | sort -V | tail -1)"
            test "$CURRENT_VERSION" = "$VERSION" || test "$NEWEST_VERSION" = "$VERSION" || {
              echo "::error::El canal $CHANNEL ya apunta a $CURRENT_VERSION; no se puede retroceder a $VERSION"
              exit 1
            }
          fi
          cp latest.json "$CHANNEL_WORKTREE/$CHANNEL.json"
          git -C "$CHANNEL_WORKTREE" add "$CHANNEL.json"
          git -C "$CHANNEL_WORKTREE" \
            -c user.name=github-actions \
            -c user.email=41898282+github-actions[bot]@users.noreply.github.com \
            commit -m "release: move $CHANNEL channel to $VERSION"
          git -C "$CHANNEL_WORKTREE" push origin HEAD:update-channels
