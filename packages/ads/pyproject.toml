[project]
name = "edecan-ads"
version = "0.7.2"
description = "Edecán — ads: preparación de campañas publicitarias, borradores bring-your-own cuenta de ads (edecan_ads). Ver ARCHITECTURE.md §13."
readme = "README.md"
requires-python = ">=3.12"
license = { text = "Apache-2.0" }
dependencies = [
    "httpx>=0.27",
    "sqlalchemy[asyncio]>=2.0.30",
    "edecan-core",
]

# Entry point que consume `edecan_core.ToolRegistry.load_entry_points`
# (group="edecan.tools", ver ARCHITECTURE.md §10.7): resuelve a un callable
# sin argumentos que devuelve `list[Tool]`, incluidas
# `ads_resumen` y `ads_preparar_campana`.
[project.entry-points."edecan.tools"]
ads = "edecan_ads:get_all_tools"

[dependency-groups]
dev = [
    "pytest>=8",
    "pytest-asyncio>=0.24",
    "respx>=0.21",
]

[tool.uv.sources]
edecan-core = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["edecan_ads"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
