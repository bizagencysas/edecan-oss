[project]
name = "edecan-agents"
version = "0.7.0"
description = "Edecán — ecosistema de agentes: perfiles, Orchestrator multi-agente y la tool delegar_mision (edecan_agents)"
readme = "README.md"
requires-python = ">=3.12"
license = { text = "Apache-2.0" }
dependencies = [
    "edecan-core",
    "edecan-schemas",
    "edecan-db",
    "sqlalchemy[asyncio]>=2.0.30",
]

# Entry point que consume `edecan_core.ToolRegistry.load_entry_points`
# (group="edecan.tools", see ARCHITECTURE.md):
# resuelve a un callable sin argumentos que devuelve `list[Tool]`.
[project.entry-points."edecan.tools"]
agents = "edecan_agents:get_all_tools"

[dependency-groups]
dev = [
    "pytest>=8",
    "pytest-asyncio>=0.24",
]

[tool.uv.sources]
edecan-core = { workspace = true }
edecan-schemas = { workspace = true }
edecan-db = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["edecan_agents"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
