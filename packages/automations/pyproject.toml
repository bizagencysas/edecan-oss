[project]
name = "edecan-automations"
version = "0.7.4"
description = "Edecán — automatizaciones: reglas agenda/webhook → instrucción de agente en modo headless (edecan_automations)"
readme = "README.md"
requires-python = ">=3.12"
license = { text = "Apache-2.0" }
dependencies = [
    "sqlalchemy[asyncio]>=2.0.30",
    "python-dateutil>=2.9",
    "edecan-core",
    "edecan-schemas",
    "edecan-db",
]

# Entry point que consume `edecan_core.ToolRegistry.load_entry_points`
# (group="edecan.tools", ver ARCHITECTURE.md §10.7): resuelve a un callable
# sin argumentos que devuelve `list[Tool]`.
[project.entry-points."edecan.tools"]
automations = "edecan_automations:get_all_tools"

[dependency-groups]
dev = [
    "pytest>=8",
    "pytest-asyncio>=0.24",
]

[tool.uv.sources]
edecan-core = { workspace = true }
edecan-schemas = { workspace = true }
edecan-db = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["edecan_automations"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
