[project]
name = "edecan-commerce"
version = "0.1.0"
description = "Edecán — dinero: cotizaciones, presupuestos y órdenes draft con gate permanente (edecan_commerce). Ver ARCHITECTURE.md §10.7 y ROADMAP_V2.md §7.4/§7.5/§7.7/§8.1 (WP-V2-10)."
readme = "README.md"
requires-python = ">=3.12"
license = { text = "Apache-2.0" }
dependencies = [
    "edecan-core",
    "edecan-schemas",
    "edecan-db",
    "sqlalchemy[asyncio]>=2.0.30",
    "httpx>=0.27",
]

# Entry point que consume `edecan_core.ToolRegistry.load_entry_points`
# (group="edecan.tools", ver ARCHITECTURE.md §10.7): resuelve a un callable
# sin argumentos que devuelve `list[Tool]`.
[project.entry-points."edecan.tools"]
commerce = "edecan_commerce:get_all_tools"

[dependency-groups]
dev = [
    "pytest>=8",
    "pytest-asyncio>=0.24",
    "respx>=0.21",
]

[tool.uv.sources]
edecan-core = { workspace = true }
edecan-schemas = { workspace = true }
edecan-db = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["edecan_commerce"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
