[alembic]
# `%(here)s` (Alembic >= 1.13) expande al directorio de este archivo, así que
# `script_location` resuelve bien sin importar desde qué directorio se invoque
# alembic (el Makefile de la raíz lo invoca como
# `uv run alembic -c packages/db/alembic.ini upgrade head`).
script_location = %(here)s/alembic
prepend_sys_path = .
path_separator = os
version_path_separator = os

# Se deja vacío a propósito: `alembic/env.py` usa `DATABASE_URL`
# (`edecan_db.settings.get_settings().database_url`) como única fuente de
# verdad en vez de duplicarla aquí (ARCHITECTURE.md §10.2).
sqlalchemy.url =

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
