[project]
name = "edecan-db"
version = "0.1.0"
description = "Edecán — capa de datos: SQLAlchemy 2.0 async + Alembic + TokenVault (edecan_db)"
readme = "README.md"
license = { text = "Apache-2.0" }
requires-python = ">=3.12"
dependencies = [
    "edecan-schemas",
    "sqlalchemy[asyncio]>=2.0.30",
    "asyncpg>=0.29",
    "alembic>=1.13",
    "pgvector>=0.3.6",
    "cryptography>=42",
    "argon2-cffi>=23.1",
    "boto3>=1.34",
    "pydantic-settings>=2.2",
]

[dependency-groups]
dev = [
    "pytest>=8",
    "pytest-asyncio>=0.24",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["edecan_db"]

[tool.uv.sources]
edecan-schemas = { workspace = true }
