[project]
name = "edecan-evals"
version = "0.7.1"
description = "Edecán — suites de evaluación del agente y biblioteca de prompts versionada (edecan_evals). Ver ARCHITECTURE.md §10.6, §10.7."
requires-python = ">=3.12"
readme = "README.md"
license = { text = "Apache-2.0" }
dependencies = [
    "pyyaml>=6.0",
    "pydantic>=2.7",
    "edecan-schemas",
    "edecan-llm",
    "edecan-core",
]

[dependency-groups]
dev = [
    "pytest>=8",
    "pytest-asyncio>=0.24",
]

# Dependencias de workspace uv (paquetes hermanos, ver pyproject.toml raíz).
# `edecan_evals.runner` SÍ importa `edecan_core` (Agent, ToolRegistry, Tool,
# ToolResult) en producción, porque el propósito de este paquete es correr el
# agente real contra un LLM/toolkit fake — no es una librería aislada como el
# resto. Ese import es DIFERIDO (dentro de una función, no a nivel de módulo,
# ver el docstring de `edecan_evals/runner.py`), así que `packages/evals/tests/`
# no necesita `edecan_core` instalado para correr: sustituye ese único punto
# de entrada por un doble local que replica el contrato de `Agent` (§10.7),
# igual que `packages/connectors/tests/conftest.py` hace con `FakeTokenBundle`
# para `edecan_schemas.TokenBundle`.
[tool.uv.sources]
edecan-schemas = { workspace = true }
edecan-llm = { workspace = true }
edecan-core = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["edecan_evals"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
