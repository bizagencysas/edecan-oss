[project]
name = "edecan-llm"
version = "0.6.0"
description = "Edecán — abstracción de proveedor LLM (Anthropic, OpenAI-compatible, Vertex AI/Gemini, Claude CLI, Codex CLI, Ollama, Bedrock stub)"
requires-python = ">=3.12"
readme = "README.md"
license = { text = "Apache-2.0" }
dependencies = [
    "httpx>=0.27",
    "pydantic>=2.7",
]

# `google-auth` SOLO hace falta para `VertexAIProvider` en modo
# "service_account" (el modo "api_key", por defecto, no lo necesita en
# absoluto — ver `edecan_llm/vertex.py` y `docs/proveedores-llm.md`).
# Optional by design, following the same pattern as the
# extra `playwright` de `packages/browser`): el import es diferido y
# guardeado dentro de `vertex.py`, y ningún test de este paquete la requiere
# instalada (mockean el `token_provider`).
[project.optional-dependencies]
vertex = ["google-auth>=2"]

[dependency-groups]
dev = [
    "respx>=0.21",
    "pytest>=8",
    "pytest-asyncio>=0.24",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["edecan_llm"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
