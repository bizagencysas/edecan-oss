[project]
name = "edecan-meetings"
version = "0.3.0"
description = "Bring-your-own meeting transcription and LLM-generated minutes for Edecan"
readme = "README.md"
requires-python = ">=3.12"
license = { text = "Apache-2.0" }
dependencies = [
    "sqlalchemy[asyncio]>=2.0.30",
    "edecan-core",
    "edecan-schemas",
    "edecan-voice",
]

# Entry point que consume `edecan_core.ToolRegistry.load_entry_points`
# (group="edecan.tools", ver ARCHITECTURE.md §10.7): resuelve a un callable
# sin argumentos que devuelve `list[Tool]`. Mismo criterio EXACTO que
# `packages/travel/pyproject.toml` (ARCHITECTURE.md §14.f).
[project.entry-points."edecan.tools"]
meetings = "edecan_meetings:get_all_tools"

[dependency-groups]
dev = [
    "pytest>=8",
    "pytest-asyncio>=0.24",
]

[tool.uv.sources]
edecan-core = { workspace = true }
edecan-schemas = { workspace = true }
edecan-voice = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["edecan_meetings"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
