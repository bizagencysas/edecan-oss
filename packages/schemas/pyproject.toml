[project]
name = "edecan-schemas"
version = "0.7.1"
description = "Edecán — contratos Pydantic v2 compartidos por todo el monorepo (edecan_schemas)"
readme = "README.md"
license = { text = "Apache-2.0" }
requires-python = ">=3.12"
dependencies = [
    "pydantic>=2.6,<3",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["edecan_schemas"]
