[project]
name = "edecan-skills"
version = "0.6.0"
description = "Open Agent Skills discovery, validation, and installation for Edecan"
readme = "README.md"
requires-python = ">=3.12"
license = { text = "Apache-2.0" }
dependencies = [
    "edecan-core",
    "httpx>=0.27",
    "PyYAML>=6",
]

# Entry point consumed by `edecan_core.ToolRegistry.load_entry_points`.
[project.entry-points."edecan.tools"]
skills = "edecan_skills:get_all_tools"

[dependency-groups]
dev = [
    "pytest>=8",
    "pytest-asyncio>=0.24",
    "respx>=0.21",
]

[tool.uv.sources]
edecan-core = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["edecan_skills"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
