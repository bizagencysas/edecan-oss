[project]
name = "edecan-skills"
version = "0.1.0"
description = "Edecán — skills: integración con el marketplace abierto de \"Agent Skills\" (skills.sh). Ver ARCHITECTURE.md §12 y DIRECCION_ACTUAL.md (WP-V3-04)."
readme = "README.md"
requires-python = ">=3.12"
license = { text = "Apache-2.0" }
dependencies = [
    "edecan-core",
    "httpx>=0.27",
    "PyYAML>=6",
]

# Entry point que consume `edecan_core.ToolRegistry.load_entry_points`
# (group="edecan.tools", ver ARCHITECTURE.md §10.7): resuelve a un callable
# sin argumentos que devuelve `list[Tool]`. Implementado en WP-V3-04 — hoy
# devuelve las 5 herramientas reales del marketplace, ver
# `edecan_skills/__init__.py`.
[project.entry-points."edecan.tools"]
skills = "edecan_skills:get_all_tools"

[dependency-groups]
dev = [
    "pytest>=8",
    "pytest-asyncio>=0.24",
    "respx>=0.21",
]

[tool.uv.sources]
edecan-core = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["edecan_skills"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
