[project]
name = "edecan-toolkit"
version = "0.3.0"
description = "Edecán — herramientas de dominio del agente: agenda, correo, CRM, finanzas, documentos, research, contenido y computadora (edecan_toolkit)"
readme = "README.md"
requires-python = ">=3.12"
license = { text = "Apache-2.0" }
dependencies = [
    "httpx>=0.27",
    "sqlalchemy[asyncio]>=2.0.30",
    "edecan-core",
    "edecan-schemas",
    "edecan-db",
    "edecan-connectors",
    "edecan-llm",
]

# Entry point que consume `edecan_core.ToolRegistry.load_entry_points`
# (group="edecan.tools", ver ARCHITECTURE.md §10.7): resuelve a un callable
# sin argumentos que devuelve `list[Tool]`.
[project.entry-points."edecan.tools"]
toolkit = "edecan_toolkit:get_all_tools"

[dependency-groups]
dev = [
    "pytest>=8",
    "pytest-asyncio>=0.24",
    "respx>=0.21",
]

[tool.uv.sources]
edecan-core = { workspace = true }
edecan-schemas = { workspace = true }
edecan-db = { workspace = true }
edecan-connectors = { workspace = true }
edecan-llm = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["edecan_toolkit"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
