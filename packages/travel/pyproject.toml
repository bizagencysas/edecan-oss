[project]
name = "edecan-travel"
version = "0.1.0"
description = "Edecán — travel: búsqueda de vuelos/hoteles vía Amadeus Self-Service (bring-your-own credenciales del tenant) y rastreo de paquetes vía AfterShip. Reservas SIEMPRE quedan como borrador para que decida un humano. Ver ARCHITECTURE.md §14 (WP-V5-09)."
readme = "README.md"
requires-python = ">=3.12"
license = { text = "Apache-2.0" }
dependencies = [
    "httpx>=0.27",
    "sqlalchemy[asyncio]>=2.0.30",
    "edecan-core",
]

# Entry point que consume `edecan_core.ToolRegistry.load_entry_points`
# (group="edecan.tools", ver ARCHITECTURE.md §10.7): resuelve a un callable
# sin argumentos que devuelve `list[Tool]`. Mismo criterio EXACTO que
# `packages/ads/pyproject.toml` (ARCHITECTURE.md §13.h) — este WP (WP-V5-09)
# entrega el paquete completo de una vez (no un esqueleto vacío a rellenar
# después), así que `edecan_travel/tools.py` ya existe desde el commit
# inicial de este paquete.
[project.entry-points."edecan.tools"]
travel = "edecan_travel:get_all_tools"

[dependency-groups]
dev = [
    "pytest>=8",
    "pytest-asyncio>=0.24",
    "respx>=0.21",
]

[tool.uv.sources]
edecan-core = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["edecan_travel"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
